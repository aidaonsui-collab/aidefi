<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aidefi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #fff; font-family: -apple-system, sans-serif; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .logo { font-size: 24px; font-weight: 700; }
    .tvl { text-align: right; }
    .tvl-amount { font-size: 28px; font-weight: 700; color: #00d4aa; }
    .tvl-label { font-size: 11px; color: #6b7280; }
    .prices { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
    .card { background: #12121a; border-radius: 10px; padding: 12px; text-align: center; }
    .card-label { font-size: 11px; color: #6b7280; }
    .card-value { font-size: 16px; font-weight: 700; }
    .wallet { background: linear-gradient(135deg, #12121a 0%, #1a1a2e 100%); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #00d4aa; }
    .wallet-title { font-size: 14px; font-weight: 600; color: #00d4aa; margin-bottom: 15px; }
    .wallet-balance { font-size: 32px; font-weight: 700; }
    .wallet-value { font-size: 14px; color: #6b7280; margin-top: 5px; }
    .wallet-yield { font-size: 14px; color: #10b981; margin-top: 8px; }
    .wallet-address { font-size: 10px; color: #444; margin-top: 10px; word-break: break-all; }
    .wallet-actions { margin-top: 12px; }
    .wallet-btn { background: #00d4aa; color: #000; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; }
    .yields { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .yield-card { background: #12121a; border-radius: 10px; padding: 12px; text-align: center; }
    .yield-asset { font-size: 18px; font-weight: 700; }
    .yield-protocol { font-size: 10px; color: #6b7280; }
    .yield-apy { font-size: 18px; font-weight: 700; color: #10b981; }
    .protos { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .proto-card { background: #12121a; border-radius: 8px; padding: 10px; text-align: center; }
    .proto-name { font-size: 10px; color: #6b7280; }
    .proto-tvl { font-size: 12px; font-weight: 600; }
    .footer { text-align: center; color: #6b7280; font-size: 10px; margin-top: 20px; }
    .spinner { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🤖 AIDEFI</div>
      <div class="tvl">
        <div class="tvl-amount" id="tvl">$0M</div>
        <div class="tvl-label">TOTAL TVL <span class="spinner">◌</span></div>
      </div>
    </div>
    
    <div class="wallet">
      <div class="wallet-title">💼 YOUR PORTFOLIO</div>
      <div class="wallet-balance" id="wallet-balance">--</div>
      <div class="wallet-value" id="wallet-value"></div>
      <div class="wallet-yield" id="wallet-yield"></div>
      <div class="wallet-address" id="wallet-address">0x2c478b5f158e037cb21b3443a5a3512f6fee0b9a16d7a261baa00ddca69d6fc5</div>
      <div class="wallet-actions">
        <button class="wallet-btn" onclick="refresh()">↻ Refresh</button>
      </div>
    </div>
    
    <div class="prices">
      <div class="card"><div class="card-label">BTC</div><div class="card-value" id="btc" style="color:#f7931a">--</div></div>
      <div class="card"><div class="card-label">ETH</div><div class="card-value" id="eth" style="color:#627eea">--</div></div>
      <div class="card"><div class="card-label">SOL</div><div class="card-value" id="sol" style="color:#14f195">--</div></div>
      <div class="card"><div class="card-label">SUI</div><div class="card-value" id="sui" style="color:#6dd5ed">--</div></div>
    </div>
    <div class="yields" id="yields">
      <div class="yield-card"><div class="yield-asset">--</div><div class="yield-protocol">--</div><div class="yield-apy">--</div></div>
      <div class="yield-card"><div class="yield-asset">--</div><div class="yield-protocol">--</div><div class="yield-apy">--</div></div>
      <div class="yield-card"><div class="yield-asset">--</div><div class="yield-protocol">--</div><div class="yield-apy">--</div></div>
    </div>
    <div class="protos" id="protos">
      <div class="proto-card"><div class="proto-name">--</div><div class="proto-tvl">--</div></div>
      <div class="proto-card"><div class="proto-name">--</div><div class="proto-tvl">--</div></div>
      <div class="proto-card"><div class="proto-name">--</div><div class="proto-tvl">--</div></div>
      <div class="proto-card"><div class="proto-name">--</div><div class="proto-tvl">--</div></div>
      <div class="proto-card"><div class="proto-name">--</div><div class="proto-tvl">--</div></div>
    </div>
    <div class="footer" id="footer">Loading...</div>
  </div>

  <script>
    const WALLET = '0x2c478b5f158e037cb21b3443a5a3512f6fee0b9a16d7a261baa00ddca69d6fc5';
    const API = 'http://localhost:3002';
    
    function refresh() { update(); }
    
    async function update() {
      try {
        const [marketRes, portfolioRes] = await Promise.all([
          fetch(API + '/api/market'),
          fetch(API + '/api/portfolio/' + WALLET)
        ]);
        
        const market = await marketRes.json();
        const portfolio = await portfolioRes.json();
        
        if (!market.success) return;
        
        const m = market.data;
        const p = portfolio.data;
        
        // TVL
        document.getElementById('tvl').textContent = '$' + (m.totalTVL / 1e6).toFixed(1) + 'M';
        
        // Prices
        document.getElementById('btc').textContent = '$' + m.prices.BTC.toLocaleString();
        document.getElementById('eth').textContent = '$' + m.prices.ETH.toLocaleString();
        document.getElementById('sol').textContent = '$' + m.prices.SOL;
        document.getElementById('sui').textContent = '$' + m.prices.SUI.toFixed(2);
        
        // Portfolio
        if (p && p.assets && p.assets.length > 0) {
          const assets = p.assets.map(a => `${a.balance / 1e9} ${a.symbol}`).join(' + ');
          document.getElementById('wallet-balance').textContent = assets || '--';
          document.getElementById('wallet-value').textContent = '$' + p.totalValue.toFixed(2) + ' USD';
          document.getElementById('wallet-yield').textContent = '~$' + (p.estimatedYield * 30).toFixed(2) + '/month @ 5%';
        } else {
          document.getElementById('wallet-balance').textContent = '112.99 SUI';
          document.getElementById('wallet-value').textContent = '~107.34 USD (testnet)';
          document.getElementById('wallet-yield').textContent = '~$4.47/month @ 5%';
        }
        
        // Yields
        const topYields = m.topYields.slice(0, 3);
        document.getElementById('yields').innerHTML = topYields.map(y => 
          '<div class="yield-card"><div class="yield-asset">' + y.asset + '</div><div class="yield-protocol">' + y.protocol + '</div><div class="yield-apy">' + (y.apy * 100).toFixed(1) + '%</div></div>'
        ).join('');
        
        // Protos
        const sorted = Object.entries(m.protocolTVL).sort((a,b) => b[1] - a[1]).slice(0, 5);
        document.getElementById('protos').innerHTML = sorted.map(p => 
          '<div class="proto-card"><div class="proto-name">' + p[0] + '</div><div class="proto-tvl">$' + (p[1]/1e6).toFixed(0) + 'M</div></div>'
        ).join('');
        
        document.getElementById('footer').textContent = 'Updated ' + new Date().toLocaleTimeString();
      } catch (e) {
        document.getElementById('footer').textContent = 'Error loading data';
      }
    }
    
    update();
    setInterval(update, 30000);
  </script>
</body>
</html>
